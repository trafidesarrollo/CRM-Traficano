components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, gerente, vendedor, operador]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - fullName
        - role
        - isActive
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, gerente, vendedor, operador]
      required:
        - username
        - email
        - password
        - fullName
        - role

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, gerente, vendedor, operador]
        isActive:
          type: boolean
        password:
          type: string

    Client:
      type: object

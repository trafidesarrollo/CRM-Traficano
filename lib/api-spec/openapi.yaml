openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CRM Comercial B2B API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: clients
    description: Client management
  - name: contacts
    description: Contact management
  - name: salespeople
    description: Salesperson management
  - name: products
    description: Products and measurements
  - name: emails
    description: Email management
  - name: opportunities
    description: Opportunity tracking
  - name: activities
    description: Activity tracking
  - name: imports
    description: CSV import operations
  - name: dashboard
    description: Dashboard metrics
  - name: prompts
    description: AI prompt management
  - name: gmail
    description: Gmail integration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:

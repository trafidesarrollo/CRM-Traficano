packages:
  "recharts": "For dashboard data visualization"
  "framer-motion": "For page transitions and interactive animations"
  "date-fns": "For formatting dates nicely"
  "papaparse": "For client-side CSV parsing before sending to API"
  "@types/papaparse": "Types for papaparse"
  "react-hook-form": "For form state management"
  "@hookform/resolvers": "For zod validation in forms"

images:
  - path: "artifacts/crm/public/images/auth-bg.png"
    description: "Abstract geometric background with dark deep slate and vibrant indigo light leaks, professional corporate enterprise feel"
    aspect_ratio: "16:9"
  - path: "artifacts/crm/public/images/logo.png"
    description: "Minimal modern geometric abstract logo mark in vibrant blue for an enterprise software company on transparent background"
    aspect_ratio: "1:1"

notes:
  - Using generated hooks from @workspace/api-client-react
  - Using wouter for routing
  - Forms use react-hook-form with zod resolvers
  - All UI text is in Argentine Spanish

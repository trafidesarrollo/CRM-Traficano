version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/crm_db
      - NODE_ENV=development
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

  crm:
    build:
      context: .
      dockerfile: Dockerfile.crm
    ports:
      - "4173:4173"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=5173
      - BASE_PATH=/
    depends_on:
      - api-server

volumes:
  pgdata:
